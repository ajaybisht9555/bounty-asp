<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BountyFix - Local Testing Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0d1117; color: #c9d1d9; padding: 40px; }
    h1 { color: #58a6ff; }
    .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 6px; max-width: 600px; margin-bottom: 20px; }
    button { background: #238636; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button:hover { background: #2ea043; }
    pre { background: #010409; padding: 15px; border-radius: 6px; overflow-x: auto; border: 1px solid #30363d; }
  </style>
</head>
<body>
  <h1>BountyFix ASP Tester</h1>
  <p>Because an ASP is an API backend, OKX.AI acts as your frontend in production. Use this dashboard to simulate OKX's marketplace.</p>

  <div class="card">
    <h3>1. Test Discovery (Free)</h3>
    <button onclick="testInitialize()">Simulate OKX Discovery</button>
    <pre id="output-1">Awaiting response...</pre>
  </div>

  <div class="card">
    <h3>2. Test x402 Payment Intercept</h3>
    <button onclick="testPaymentIntercept()">Simulate User Triggering Agent</button>
    <pre id="output-2">Awaiting response...</pre>
  </div>

  <script>
    async function testInitialize() {
      document.getElementById('output-1').innerText = "Loading...";
      try {
        const res = await fetch('/api/agents/demo-agent/mcp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ method: 'initialize' })
        });
        const data = await res.json();
        document.getElementById('output-1').innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('output-1').innerText = err.toString();
      }
    }

    async function testPaymentIntercept() {
      document.getElementById('output-2').innerText = "Loading...";
      try {
        const res = await fetch('/api/agents/demo-agent/mcp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            method: 'tools/call', 
            params: { name: 'fix_github_issue', owner: 'test', repo: 'test', issueNumber: 1, filePath: 'test.js' } 
          })
        });
        
        const status = res.status;
        const x402Header = res.headers.get('payment-required');
        let parsedHeader = 'None';
        if (x402Header) {
          parsedHeader = JSON.parse(atob(x402Header));
        }

        const body = await res.json();

        document.getElementById('output-2').innerText = `HTTP Status: ${status}\n\nBase64 Decoded x402 Header:\n${JSON.stringify(parsedHeader, null, 2)}\n\nResponse Body:\n${JSON.stringify(body, null, 2)}`;
      } catch (err) {
        document.getElementById('output-2').innerText = err.toString();
      }
    }
  </script>
</body>
</html>
